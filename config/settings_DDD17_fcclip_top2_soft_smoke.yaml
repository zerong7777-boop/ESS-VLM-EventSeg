dataset:
  name_a: Cityscapes_gray
  name_b: DDD17_events
  DDD17_events:
    dataset_path: data/ddd17_seg/data
    split_train: train
    shape:
    - 200
    - 346
    nr_events_data: 20
    nr_events_files_per_data: None
    fixed_duration: false
    delta_t_per_data: 50
    require_paired_data_train: true
    require_paired_data_val: true
    nr_events_window: 32000
    event_representation: voxel_grid
    nr_temporal_bins: 5
    separate_pol: false
    normalize_event: false
    pseudolabels_path_b: data/ddd17_pseudolabels/fcclip_no_filter_cropped/train
    top2_soft_labels_path_b: data/ddd17_pseudolabels/fcclip_top2_soft_cropped
    use_pseudolabels_train_b: true
    pseudolabel_ignore_label_b: 255
    max_train_samples: 4
    max_valid_samples: 4
  cityscapes_img:
    dataset_path: data/cityscapes
    shape:
    - 200
    - 352
    random_crop: true
    read_two_imgs: false
    require_paired_data_train: false
    require_paired_data_val: false
task:
  semseg_num_classes: 6
dir:
  log: log/ddd17_fcclip_top2_soft_smoke
model:
  model_name: ess
  skip_connect_encoder: true
  skip_connect_task: true
  skip_connect_task_type: concat
  data_augmentation_train: true
  train_on_event_labels: false
optim:
  batch_size_a: 2
  batch_size_b: 2
  lr_front: 1e-5
  lr_back: 1e-4
  lr_decay: 1
  num_epochs: 1
  val_epoch_step: 100
  weight_task_loss: 1
  weight_cycle_pred_loss: 1
  weight_cycle_emb_loss: 0.01
  weight_cycle_task_loss: 0.01
  weight_pseudolabel_loss: 0.05
  use_top2_soft_distillation: true
  weight_top2_soft_distillation: 0.05
  train_loader_len_source: second
  skip_validation: true
  task_loss:
  - dice
  - cross_entropy
checkpoint:
  save_checkpoint: false
  resume_training: false
  load_pretrained_weights: false
  resume_file: ''
  pretrained_file: ''
hardware:
  num_cpu_workers: 4
  gpu_device: 0
